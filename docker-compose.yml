services:

  postgres:
    image: postgres:${POSTGRES_VERSION}
    restart: unless-stopped

    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - automation-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION}
    restart: unless-stopped

    ports:
      - "${N8N_PORT}:5678"

    environment:
      TZ: ${TZ}
      GENERIC_TIMEZONE: ${TZ}

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - n8n_data:/home/node/.n8n

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - automation-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION}
    restart: unless-stopped

    environment:
      TZ: ${TZ}

    ports:
      - "${OLLAMA_PORT}:11434"

    volumes:
      - ollama_data:/root/.ollama

    networks:
      - automation-network

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped

    environment:
      TZ: ${TZ}
      OLLAMA_BASE_URL: http://ollama:11434

    ports:
      - "${OPENWEBUI_PORT}:8080"

    volumes:
      - openwebui_data:/app/backend/data

    depends_on:
      ollama:
        condition: service_healthy

    networks:
      - automation-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  n8n_data:
  ollama_data:
  openwebui_data:

networks:
  automation-network:
    driver: bridge